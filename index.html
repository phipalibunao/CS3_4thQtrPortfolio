<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
background:#050000;
color:#ff2b45;
font-family:'Press Start 2P',cursive;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.boot-screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
text-align:center;
}

.boot-text{
font-size:.8rem;
margin-bottom:20px;
}

.terminal{
font-size:.6rem;
line-height:1.5;
text-align:left;
width:80%;
max-width:600px;
min-height:120px;
margin-bottom:20px;
}

.cursor{
display:inline-block;
width:10px;
background:#ff2b45;
margin-left:5px;
animation:blink .8s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

/* BUTTON */
.open-btn{
display:none;
margin-top:20px;
padding:12px 20px;
border:2px solid #ff2b45;
background:transparent;
color:#ff2b45;
font-family:'Press Start 2P',cursive;
font-size:.7rem;
cursor:pointer;
transition:.3s;
}

.open-btn:hover{
background:#ff2b45;
color:black;
transform:scale(1.05);
}

/* MINI POPUPS */
.mini-window{
position:absolute;
width:240px;
height:120px;
background:#0f0f0f;
color:#ff2b45;
border:2px solid #ff2b45;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-size:.6rem;
box-shadow:0 0 10px rgba(255,43,69,.5);
animation:flicker .12s infinite alternate;
}

@keyframes flicker{
0%{opacity:.6;transform:scale(.98);}
100%{opacity:1;transform:scale(1.03);}
}
</style>
</head>

<body>

<div class="boot-screen">
<div class="boot-text">Initializing Final Portfolio...</div>
<div class="terminal" id="terminal"></div>

<button class="open-btn" id="openBtn">OPEN PORTFOLIO</button>
</div>

<script>
const terminal=document.getElementById("terminal");
const openBtn=document.getElementById("openBtn");

const lines=[
"Launching final portfolio...",
"Compiling achievements...",
"Rendering creativity...",
"Injecting aesthetics...",
"Final touches applied...",
"Portfolio ready!"
];

let i=0;

function typeLine(){
if(i<lines.length){
terminal.innerHTML+=lines[i]+"<br>";
i++;
setTimeout(typeLine,450);
}else{
terminal.innerHTML+="<br>Done.<span class='cursor'></span>";
clearInterval(popupInterval);
openBtn.style.display="inline-block";
}
}

typeLine();

/* OPEN BUTTON */
openBtn.addEventListener("click",()=>{
window.location.href="./public/homepage.html";
});

/* MINI POPUPS */
function createMiniWindow(){
const mini=document.createElement("div");
mini.classList.add("mini-window");

mini.style.top=Math.random()*(window.innerHeight-140)+"px";
mini.style.left=Math.random()*(window.innerWidth-260)+"px";

const messages=[
"Loading assets...",
"Injecting UI...",
"System glitch??",
"Rendering...",
"Almost there...",
"Portfolio Live"
];

mini.innerHTML=messages[Math.floor(Math.random()*messages.length)];

document.body.appendChild(mini);

setTimeout(()=>{
mini.remove();
},300+Math.random()*700);
}

const popupInterval=setInterval(createMiniWindow,180);
</script>

</body>
</html>
